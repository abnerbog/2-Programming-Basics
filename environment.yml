name: mkdocs-quarto-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - r-quarto # Quarto CLI for rendering QMD files
  - r-base # For R support
  - r-tidyverse # For read_csv, dplyr functions in R code
  - pip:
    - mkdocs # The core MkDocs static site generator
    - mkdocs-material # The theme specified in mkdocs.yml
    - mkquartodocs # The plugin to handle Quarto files